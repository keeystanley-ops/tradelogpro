kind = "web"
previewPath = "/"
title = "Trading Journal & Analytics"
version = "1.0.0"
id = "artifacts/trading-journal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21194
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/trading-journal run dev"

[services.env]
PORT = "21194"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/trading-journal", "run", "build"]
publicDir = "artifacts/trading-journal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
